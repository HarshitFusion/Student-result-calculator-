<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Result Calculator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

<h1>🎓 Student Result Calculator</h1>
<p class="subtitle">Enter your marks to calculate result</p>

<form action="/result" method="POST">

<div class="input-group">
<label>Math</label>
<input type="number" name="math" placeholder="Marks" required>
</div>

<div class="input-group">
<label>Science</label>
<input type="number" name="science" placeholder="Marks" required>
</div>

<div class="input-group">
<label>English</label>
<input type="number" name="english" placeholder="Marks" required>
</div>

<button type="submit">Calculate Result</button>

</form>

</div>

</body>
</html>
